server:
  port: 8081

spring:
  profiles:
    active: mysql
  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from: ${MAIL_FROM}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: false
    mail:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/library_seat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:library}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
  jackson:
    time-zone: Asia/Shanghai
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: library-seat
    access-token-ttl-seconds: 7200

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:}

logging:
  level:
    com.example.libraryseat.security: INFO
